<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrDim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect x="0" y="0" width="880" height="560" rx="14" fill="#0d1117"/>

  <!-- internet -->
  <text x="88" y="52" fill="#e6edf3" font-size="14" font-weight="600" text-anchor="middle">&#127760; Internet</text>

  <!-- cloudflare -->
  <rect x="250" y="22" width="200" height="50" rx="10" fill="#161b22" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="350" y="43" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">Cloudflare Edge</text>
  <text x="350" y="60" fill="#8b949e" font-size="10.5" text-anchor="middle">Zero-trust tunnel &#183; no open ports</text>

  <!-- aws control plane -->
  <rect x="640" y="22" width="200" height="50" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="740" y="43" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">AWS Control Plane</text>
  <text x="740" y="60" fill="#8b949e" font-size="10.5" text-anchor="middle">ECS Anywhere &#183; ECR</text>

  <!-- arrows: internet -> cloudflare, cloudflare -> gateway -->
  <line x1="130" y1="47" x2="243" y2="47" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 350 72 L 350 128" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)" fill="none"/>
  <text x="362" y="105" fill="#38bdf8" font-size="10.5">outbound-only tunnel</text>

  <!-- aws -> aws-ecs vm (dashed) -->
  <path d="M 740 72 L 740 120 L 545 120 L 545 305" stroke="#8b949e" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arrDim)" fill="none"/>

  <!-- proxmox host -->
  <rect x="40" y="130" width="580" height="330" rx="12" fill="#10151d" stroke="#30363d" stroke-width="1.4"/>
  <text x="60" y="158" fill="#e6edf3" font-size="14" font-weight="700">Proxmox VE</text>
  <text x="152" y="158" fill="#8b949e" font-size="11">bare-metal hypervisor &#183; 12 cores / 32 GB</text>

  <!-- gateway VM -->
  <rect x="62" y="175" width="260" height="120" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="78" y="199" fill="#38bdf8" font-size="12" font-weight="700">gateway VM</text>
  <text x="78" y="219" fill="#c9d1d9" font-size="11">cloudflared &#183; ingress</text>
  <text x="78" y="237" fill="#c9d1d9" font-size="11">Beszel fleet monitor</text>
  <text x="78" y="255" fill="#c9d1d9" font-size="11">node_exporter &#183; promtail</text>

  <!-- monitoring VM -->
  <rect x="338" y="175" width="260" height="120" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="354" y="199" fill="#38bdf8" font-size="12" font-weight="700">monitoring VM</text>
  <text x="354" y="219" fill="#c9d1d9" font-size="11">Prometheus &#183; Grafana</text>
  <text x="354" y="237" fill="#c9d1d9" font-size="11">Loki &#183; Alertmanager</text>
  <text x="354" y="255" fill="#c9d1d9" font-size="11">blackbox &#183; PVE exporters</text>

  <!-- services VM -->
  <rect x="62" y="315" width="260" height="120" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="78" y="339" fill="#38bdf8" font-size="12" font-weight="700">services VM</text>
  <text x="78" y="359" fill="#c9d1d9" font-size="11">Pi-hole &#183; Caddy &#183; CouchDB</text>
  <text x="78" y="377" fill="#c9d1d9" font-size="11">Minecraft Bedrock</text>
  <text x="78" y="395" fill="#c9d1d9" font-size="11">GitHub Actions runner</text>

  <!-- aws-ecs VM -->
  <rect x="338" y="315" width="260" height="120" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="354" y="339" fill="#38bdf8" font-size="12" font-weight="700">aws-ecs VM</text>
  <text x="354" y="359" fill="#c9d1d9" font-size="11">ECS Anywhere agent</text>
  <text x="354" y="377" fill="#c9d1d9" font-size="11">Production SaaS workloads</text>
  <text x="354" y="395" fill="#c9d1d9" font-size="11">scheduled scrapers &#183; APIs</text>

  <!-- esx8 GPU node -->
  <rect x="670" y="240" width="180" height="150" rx="12" fill="#10151d" stroke="#30363d" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="686" y="268" fill="#e6edf3" font-size="13" font-weight="700">esx8 &#183; R630</text>
  <text x="686" y="288" fill="#c9d1d9" font-size="11">GPU node</text>
  <text x="686" y="308" fill="#c9d1d9" font-size="11">Ollama LLM inference</text>
  <text x="686" y="334" fill="#8b949e" font-size="10.5">off by default,</text>
  <text x="686" y="350" fill="#8b949e" font-size="10.5">powered on-demand</text>

  <!-- proxmox -> esx8 (iDRAC) -->
  <path d="M 620 315 L 663 315" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr)" fill="none"/>
  <text x="642" y="303" fill="#38bdf8" font-size="10" text-anchor="middle">iDRAC</text>
  <text x="642" y="332" fill="#8b949e" font-size="9.5" text-anchor="middle">Redfish</text>

  <!-- tailscale band -->
  <rect x="40" y="486" width="810" height="44" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="445" y="513" fill="#8b949e" font-size="12" text-anchor="middle">&#128274; Tailscale mesh VPN &#8212; private admin access to every node &#183; managed with Ansible</text>
</svg>
